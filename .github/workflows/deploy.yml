name: Deploy to GitHub Pages

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: 'psicologia-app/package-lock.json'

      - name: Install dependencies
        working-directory: ./psicologia-app
        run: npm ci

      - name: Build Next.js with export
        working-directory: ./psicologia-app
        run: npm run build

      - name: Create out directory
        run: mkdir -p psicologia-app/out

      - name: Copy static files
        run: cp -r psicologia-app/.next/static psicologia-app/out/ || true

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: 'psicologia-app/out'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v3
